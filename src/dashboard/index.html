<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Org Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3a;
      --text: #e2e8f0; --muted: #64748b;
      --blue: #38bdf8; --green: #4ade80; --red: #ef4444;
      --yellow: #fbbf24; --purple: #a78bfa; --orange: #fb923c;
      --gray: #374151;
    }
    body { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Header ── */
    #header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    #header h1 { font-size: 16px; font-weight: 600; color: var(--blue); }
    #status-badge { padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; text-transform: uppercase; }
    .status-idle { background: var(--gray); color: var(--muted); }
    .status-running { background: #1e3a5f; color: var(--blue); }
    .status-waiting_approval { background: #4a3f1e; color: var(--yellow); }
    .status-complete { background: #1a3a2a; color: var(--green); }
    .status-failed { background: #3a1a1a; color: var(--red); }

    /* ── Stats bar ── */
    #stats-bar { padding: 12px 24px; border-bottom: 1px solid var(--border); display: flex; gap: 24px; font-size: 13px; background: var(--surface); flex-wrap: wrap; }
    .stat { display: flex; align-items: center; gap: 6px; }
    .stat-label { color: var(--muted); }
    .stat-value { font-weight: 600; }
    .stat-green { color: var(--green); }
    .stat-red { color: var(--red); }
    .stat-blue { color: var(--blue); }
    .stat-yellow { color: var(--yellow); }
    .stat-purple { color: var(--purple); }

    /* ── Run summary banner ── */
    #run-summary { display: none; padding: 16px 24px; border-bottom: 2px solid var(--blue); background: linear-gradient(90deg, #1a1d27 0%, #1e2a3a 100%); }
    #run-summary.visible { display: block; }
    #run-summary h2 { font-size: 14px; font-weight: 600; color: var(--blue); margin-bottom: 8px; }
    #run-summary .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
    #run-summary .metric-card { padding: 8px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; }
    #run-summary .metric-card .label { font-size: 11px; color: var(--muted); display: block; }
    #run-summary .metric-card .value { font-size: 18px; font-weight: 700; }

    /* ── Layout ── */
    #main { display: grid; grid-template-columns: 1fr 1fr; height: calc(100vh - 100px); }
    .panel { border-right: 1px solid var(--border); overflow-y: auto; }
    .panel:last-child { border-right: none; }
    .panel-header { padding: 12px 16px; font-size: 12px; font-weight: 600; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 1; }

    /* ── Org chart ── */
    #org-chart { padding: 16px; }
    .org-node { margin: 2px 0; }
    .org-label { display: flex; align-items: center; gap: 8px; padding: 4px 8px; border-radius: 4px; font-size: 13px; }
    .org-label:hover { background: var(--surface); }
    .org-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .org-children { margin-left: 20px; border-left: 1px solid var(--border); padding-left: 8px; }
    .dot-pending { background: var(--gray); }
    .dot-running { background: var(--blue); animation: pulse 1.5s infinite; }
    .dot-complete { background: var(--green); }
    .dot-failed { background: var(--red); }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* ── Event log ── */
    #event-log { padding: 8px; }
    .event-item { padding: 6px 8px; border-radius: 4px; font-size: 12px; margin-bottom: 2px; display: flex; gap: 8px; }
    .event-item:hover { background: var(--surface); }
    .event-time { color: var(--muted); flex-shrink: 0; min-width: 70px; }
    .event-type { flex-shrink: 0; min-width: 60px; font-weight: 600; }
    .event-msg { color: var(--text); word-break: break-all; }
    .type-spawn { color: var(--blue); }
    .type-complete { color: var(--green); }
    .type-fail { color: var(--red); }
    .type-retry { color: var(--orange); }
    .type-info { color: var(--muted); }
    .type-gate { color: var(--yellow); }
    .type-run_summary { color: var(--purple); }
    .type-review { color: var(--orange); }
    .type-refine { color: var(--orange); }

    /* ── Approval banner ── */
    #approval-panel { display: none; position: fixed; bottom: 0; left: 0; right: 0; padding: 16px 24px; background: #4a3f1e; border-top: 2px solid var(--yellow); z-index: 10; }
    #approval-panel.visible { display: block; }
    #approval-panel p { font-size: 14px; color: var(--yellow); }
    #approval-panel small { color: var(--muted); font-size: 12px; }

    /* ── Filter bar ── */
    #filter-bar { padding: 8px 16px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-btn { padding: 2px 10px; border-radius: 10px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 11px; cursor: pointer; font-family: inherit; }
    .filter-btn.active { background: var(--surface); color: var(--text); border-color: var(--blue); }
  </style>
</head>
<body>

<div id="header">
  <h1>⚡ Agent Org Dashboard</h1>
  <span id="status-badge" class="status-idle">idle</span>
</div>

<div id="stats-bar">
  <div class="stat"><span class="stat-label">Completed:</span><span class="stat-value stat-green" id="stat-completed">0</span></div>
  <div class="stat"><span class="stat-label">Failed:</span><span class="stat-value stat-red" id="stat-failed">0</span></div>
  <div class="stat"><span class="stat-label">Total Events:</span><span class="stat-value stat-blue" id="stat-events">0</span></div>
  <div class="stat"><span class="stat-label">Elapsed:</span><span class="stat-value" id="stat-elapsed">0s</span></div>
</div>

<!-- Phase 12: Run summary (shown when run_summary event arrives) -->
<div id="run-summary">
  <h2>Run Summary</h2>
  <div class="metrics-grid">
    <div class="metric-card"><span class="label">Total Agents</span><span class="value stat-blue" id="rs-total">-</span></div>
    <div class="metric-card"><span class="label">Succeeded</span><span class="value stat-green" id="rs-succeeded">-</span></div>
    <div class="metric-card"><span class="label">Failed</span><span class="value stat-red" id="rs-failed">-</span></div>
    <div class="metric-card"><span class="label">Retries</span><span class="value stat-yellow" id="rs-retries">-</span></div>
    <div class="metric-card"><span class="label">Tokens (in/out)</span><span class="value stat-purple" id="rs-tokens">-</span></div>
    <div class="metric-card"><span class="label">Duration</span><span class="value" id="rs-duration">-</span></div>
  </div>
</div>

<div id="main">
  <div class="panel">
    <div class="panel-header">Org Chart</div>
    <div id="org-chart"></div>
  </div>
  <div class="panel">
    <div class="panel-header">Event Log</div>
    <div id="filter-bar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="spawn">Spawn</button>
      <button class="filter-btn" data-filter="complete">Complete</button>
      <button class="filter-btn" data-filter="fail">Fail</button>
      <button class="filter-btn" data-filter="gate">Gates</button>
    </div>
    <div id="event-log"></div>
  </div>
</div>

<div id="approval-panel">
  <p>⏸ Awaiting human approval — check the terminal to respond.</p>
  <small>The orchestrator is paused at a milestone gate.</small>
</div>

<script>
  // ── Org chart definition ──
  const ORG_TREE = {
    label: "CEO", role: "ceo", children: [
      { label: "PM", role: "pm", children: [
        { label: "UX Researcher", role: "ux-researcher" },
        { label: "Roadmap", role: "roadmap-agent" },
        { label: "Analytics", role: "analytics-agent" },
      ]},
      { label: "CTO", role: "cto", children: [
        { label: "Eng Manager", role: "engineering-manager", children: [
          { label: "Frontend", role: "frontend-engineer" },
          { label: "Backend", role: "backend-engineer" },
          { label: "AI", role: "ai-engineer" },
          { label: "DevOps", role: "devops-agent" },
        ]},
        { label: "QA Manager", role: "qa-manager", children: [
          { label: "Testing", role: "testing-agent" },
          { label: "Performance", role: "performance-agent" },
        ]},
      ]},
      { label: "CISO", role: "ciso", children: [
        { label: "Sec Auditor", role: "security-auditor" },
        { label: "Vuln Scanner", role: "vuln-scanner" },
        { label: "Compliance", role: "compliance-agent" },
      ]},
      { label: "CFO", role: "cfo", children: [
        { label: "Budget", role: "budget-agent" },
        { label: "Pricing", role: "pricing-agent" },
      ]},
      { label: "COO", role: "coo", children: [
        { label: "Scheduler", role: "scheduler-agent" },
        { label: "Workflow", role: "workflow-agent" },
        { label: "Monitoring", role: "monitoring-agent" },
      ]},
    ],
  };

  // ── State ──
  const agentStates = {}; // role -> "pending" | "running" | "complete" | "failed"
  const events = [];
  let currentFilter = "all";
  let startTime = null;

  // ── Build org chart DOM ──
  function renderOrgTree(node, container) {
    const wrapper = document.createElement("div");
    wrapper.className = "org-node";

    const label = document.createElement("div");
    label.className = "org-label";
    label.id = `node-${node.role}`;
    const dot = document.createElement("span");
    dot.className = "org-dot dot-pending";
    dot.id = `dot-${node.role}`;
    label.appendChild(dot);
    label.appendChild(document.createTextNode(node.label));
    wrapper.appendChild(label);

    if (node.children) {
      const children = document.createElement("div");
      children.className = "org-children";
      for (const child of node.children) {
        renderOrgTree(child, children);
      }
      wrapper.appendChild(children);
    }

    container.appendChild(wrapper);
    agentStates[node.role] = "pending";
  }

  renderOrgTree(ORG_TREE, document.getElementById("org-chart"));

  // ── Update agent state ──
  function setAgentState(role, state) {
    agentStates[role] = state;
    const dot = document.getElementById(`dot-${role}`);
    if (dot) {
      dot.className = `org-dot dot-${state}`;
    }
  }

  // ── Add event to log ──
  function addEvent(event) {
    events.push(event);
    if (!startTime) startTime = new Date(event.timestamp);
    updateStats();

    if (currentFilter !== "all" && event.type !== currentFilter) return;

    const log = document.getElementById("event-log");
    const item = document.createElement("div");
    item.className = "event-item";
    const time = new Date(event.timestamp).toLocaleTimeString();
    const timeSpan = document.createElement("span");
    timeSpan.className = "event-time";
    timeSpan.textContent = time;
    const typeSpan = document.createElement("span");
    typeSpan.className = `event-type type-${event.type}`;
    typeSpan.textContent = event.type;
    const msgSpan = document.createElement("span");
    msgSpan.className = "event-msg";
    msgSpan.textContent = event.summary || event.error || "";
    item.appendChild(timeSpan);
    item.appendChild(typeSpan);
    item.appendChild(msgSpan);
    log.insertBefore(item, log.firstChild);
  }

  // ── Update stats ──
  function updateStats() {
    const completed = Object.values(agentStates).filter(s => s === "complete").length;
    const failed = Object.values(agentStates).filter(s => s === "failed").length;
    document.getElementById("stat-completed").textContent = completed;
    document.getElementById("stat-failed").textContent = failed;
    document.getElementById("stat-events").textContent = events.length;

    if (startTime) {
      const elapsed = Math.floor((Date.now() - startTime.getTime()) / 1000);
      document.getElementById("stat-elapsed").textContent = `${elapsed}s`;
    }
  }

  // ── Update status badge ──
  function updateStatus(status) {
    const badge = document.getElementById("status-badge");
    badge.className = `status-${status}`;
    badge.textContent = status.replace("_", " ");
    if (status === "waiting_approval") {
      document.getElementById("approval-panel").classList.add("visible");
    } else {
      document.getElementById("approval-panel").classList.remove("visible");
    }
  }

  // ── Filter buttons ──
  document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentFilter = btn.dataset.filter;
      // Re-render visible events
      const log = document.getElementById("event-log");
      log.innerHTML = "";
      const filtered = currentFilter === "all" ? events : events.filter(e => e.type === currentFilter);
      for (const event of filtered.reverse()) {
        const item = document.createElement("div");
        item.className = "event-item";
        const time = new Date(event.timestamp).toLocaleTimeString();
        const timeSpan = document.createElement("span");
        timeSpan.className = "event-time";
        timeSpan.textContent = time;
        const typeSpan = document.createElement("span");
        typeSpan.className = `event-type type-${event.type}`;
        typeSpan.textContent = event.type;
        const msgSpan = document.createElement("span");
        msgSpan.className = "event-msg";
        msgSpan.textContent = event.summary || event.error || "";
        item.appendChild(timeSpan);
        item.appendChild(typeSpan);
        item.appendChild(msgSpan);
        log.appendChild(item);
      }
    });
  });

  // ── SSE connection ──
  function connect() {
    const es = new EventSource("/events");

    es.addEventListener("connected", (e) => {
      const data = JSON.parse(e.data);
      updateStatus(data.status);
      if (data.startTime) startTime = new Date(data.startTime);
      // Phase 12: restore run summary if present
      if (data.metrics) showRunSummary(data.metrics);
      for (const event of data.events) {
        processEvent(event);
      }
    });

    es.onmessage = (e) => {
      const event = JSON.parse(e.data);
      processEvent(event);
    };

    es.onerror = () => {
      // Auto-reconnect is built into EventSource
    };
  }

  function processEvent(event) {
    if (event.type === "spawn" && event.to) {
      setAgentState(event.to, "running");
    } else if (event.type === "complete" && event.role) {
      setAgentState(event.role, "complete");
    } else if (event.type === "fail" && event.role) {
      setAgentState(event.role, "failed");
    } else if (event.type === "gate") {
      updateStatus("waiting_approval");
    }
    // Phase 12: run summary event
    if (event.type === "run_summary" && event.metrics) {
      showRunSummary(event.metrics);
      updateStatus("complete");
    }

    if (event.type === "complete" && event.role === "ceo") updateStatus("complete");
    if (event.type === "fail" && event.role === "ceo") updateStatus("failed");

    addEvent(event);
  }

  // Phase 12: populate and show the run summary panel
  function showRunSummary(m) {
    document.getElementById("rs-total").textContent = m.totalAgents;
    document.getElementById("rs-succeeded").textContent = m.succeeded;
    document.getElementById("rs-failed").textContent = m.failed;
    document.getElementById("rs-retries").textContent = m.retried;
    document.getElementById("rs-tokens").textContent =
      `${m.totalTokens.input.toLocaleString()} / ${m.totalTokens.output.toLocaleString()}`;
    document.getElementById("rs-duration").textContent = `${(m.totalDurationMs / 1000).toFixed(1)}s`;
    document.getElementById("run-summary").classList.add("visible");
  }

  // Start
  connect();
  setInterval(updateStats, 1000);
</script>
</body>
</html>
